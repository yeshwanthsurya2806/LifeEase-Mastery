<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LifeEase Health</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="health" style="min-height:100vh;">
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">LifeEase</div>
      <div class="nav-links">
        <a class="nav-link" href="dashboard.html" data-page="dashboard">Dashboard</a>
        <a class="nav-link" href="wealth.html" data-page="wealth">Wealth</a>
        <a class="nav-link" href="health.html" data-page="health">Health</a>
      </div>
    </div>
    <div class="nav-right" style="gap:12px; align-items:center;">
      <div id="userAvatar" class="user-avatar">G</div>
      <div id="userProfile" style="display:flex;flex-direction:column; align-items:flex-end;font-size:0.85rem;text-align:right;line-height:1.1;">
        <strong id="userName">Guest</strong>
        <span id="userEmail">Please login</span>
      </div>
      <button id="logoutBtn" class="btn">Logout</button>
      <button id="themeToggle" class="btn">Theme</button>
    </div>
  </nav>

  <main class="main-container" style="padding-top:120px;">
    <section class="section-title">Health Dashboard</section>
    <div class="grid grid-4" style="margin-bottom:20px;">
      <article class="card"><h4>Water Today</h4><p id="waterStat" class="stat">0 L</p></article>
      <article class="card"><h4>Steps</h4><p id="stepsStat" class="stat">0</p></article>
      <article class="card"><h4>Sleep</h4><p id="sleepStat" class="stat">0 hrs</p></article>
      <article class="card"><h4>Health Score</h4><p id="healthScore" class="stat">0 / 100</p></article>
    </div>

    <section class="card" style="margin-bottom:18px;">
      <h3>Daily intake</h3>
      <div class="form-row" style="margin-top:10px; gap:10px;">
        <input id="waterAmount" class="input" placeholder="Litres" type="number" min="0" step="0.1"><button class="btn btn-primary" onclick="addWater()">Add Water</button>
        <input id="stepCount" class="input" placeholder="Steps" type="number" min="0"><button class="btn btn-primary" onclick="addSteps()">Add Steps</button>
        <input id="sleepHours" class="input" placeholder="Sleep (hrs)" type="number" min="0" step="0.1"><button class="btn btn-primary" onclick="addSleep()">Add Sleep</button>
      </div>
    </section>

    <section class="card" style="margin-bottom:18px;">
      <h3>Workout</h3>
      <div class="form-row" style="margin-top:10px; gap:10px;">
        <input id="exerciseName" class="input" placeholder="Exercise">
        <input id="exerciseTime" class="input" placeholder="Minutes" type="number" min="0">
        <button class="btn btn-primary" onclick="addExercise()">Add</button>
      </div>
      <div class="table-wrap" style="margin-top:12px;"><table><thead><tr><th>Exercise</th><th>Minutes</th></tr></thead><tbody id="exerciseTable"></tbody></table></div>
    </section>

    <section class="card" style="margin-bottom:18px;"><h3>BMI Calculator</h3><div class="form-row" style="margin-top:10px; gap:10px;"><input id="bmiWeight" class="input" placeholder="Weight (kg)" type="number" min="0" step="0.1"><input id="bmiHeight" class="input" placeholder="Height (cm)" type="number" min="0" step="0.1"><button class="btn btn-primary" onclick="calculateBMI()">Calculate BMI</button></div><p id="bmiResult" class="small-text" style="margin-top:10px;">No BMI computed yet</p></section>
<section class="card" style="margin-bottom:18px;">
      <h3>Analytics</h3>
      <div class="chart-box" style="height:260px;"><canvas id="healthChart"></canvas></div>
    </section>

  </main>

  <script type="module" src="script.js?v=6"></script>
</body>
</html>
