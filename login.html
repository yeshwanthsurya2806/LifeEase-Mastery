<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - LifeEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <main class="main-container" style="padding-top:140px; max-width:420px;">
    <section class="glass" style="padding:26px;">
      <h2>Welcome Back</h2>
      <p class="small-text">Login with email and password</p>
      <div class="form-row" style="margin-top:14px; gap:12px;">
        <input id="loginEmail" type="email" placeholder="Email" class="input" required>
        <input id="loginPassword" type="password" placeholder="Password" class="input" required>
        <button type="button" id="submitLogin" class="btn btn-primary">Login</button>
      </div>
      <p style="margin-top:14px;">No account? <a href="signup.html">Create one</a></p>
    </section>
  </main>
  <script type="module" src="./login.js?v=6"></script>
</body>
</html>
